<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g transform="translate(256, 256)">
    <!-- Wheel -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#4ecdc4" stroke-width="12"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#4ecdc4" stroke-width="8" stroke-dasharray="20,10"/>
    <!-- Crank -->
    <line x1="0" y1="0" x2="70" y2="70" stroke="#ff6b6b" stroke-width="16" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-70" y2="-70" stroke="#ff6b6b" stroke-width="16" stroke-linecap="round"/>
    <!-- Pedals -->
    <circle cx="70" cy="70" r="20" fill="#ff6b6b"/>
    <circle cx="-70" cy="-70" r="20" fill="#ff6b6b"/>
    <!-- Seat -->
    <ellipse cx="-80" cy="-100" rx="25" ry="12" fill="#4ecdc4"/>
    <!-- Handlebars -->
    <path d="M80,-90 Q60,-70 90,-50" fill="none" stroke="#4ecdc4" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
