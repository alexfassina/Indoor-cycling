name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Create Android project structure
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/java/com/indoorcycling/app
          
      - name: Create AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.indoorcycling.app">
              <uses-permission android:name="android.permission.BLUETOOTH"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:label="Indoor Cycling"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
      - name: Create MainActivity.java
        run: |
          cat > android/app/src/main/java/com/indoorcycling/app/MainActivity.java << 'EOF'
          package com.indoorcycling.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
          }
          EOF
          
      - name: Create layout
        run: |
          cat > android/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent"/>
          EOF
          
      - name: Create strings.xml
        run: |
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Indoor Cycling</string>
          </resources>
          EOF
          
      - name: Create build.gradle (app)
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.indoorcycling.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.indoorcycling.app"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          EOF
          
      - name: Create settings.gradle
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "IndoorCycling"
          include ':app'
          EOF
          
      - name: Create build.gradle (project)
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
          }
          plugins {
              id 'com.android.application' version '8.1.0' apply false
          }
          EOF
          
      - name: Copy web files
        run: |
          cp index.html android/app/src/main/assets/
          cp -r src android/app/src/main/assets/ || true
          cp -r public android/app/src/main/assets/ || true
          ls -la android/app/src/main/assets/
          
      - name: Setup Gradle
        run: |
          cd android
          mkdir -p gradle/wrapper
          gradle wrapper --gradle-version=8.0
          
      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
          
      - name: Check APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/ || echo "APK not found"
          
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: indoor-cycling-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
